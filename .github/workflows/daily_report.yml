name: Zoho Daily Report

on:
  schedule:
    # ตั้งเวลาให้รัน (UTC) 11:00 UTC คือ 18:00 ไทย
    - cron: '0 11 * * *'
  workflow_dispatch: # กดรันเองได้ด้วยมือ

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Restore Zoho Session
        env:
          ZOHO_SESSION: ${{ secrets.ZOHO_SESSION_BASE64 }}
        run: |
          if [ -n "$ZOHO_SESSION" ]; then
            echo "$ZOHO_SESSION" | base64 -d > session.json
            echo "✅ session.json restored"
            echo "📏 File size: $(wc -c < session.json) bytes"
            echo "🍪 Cookies count: $(cat session.json | python3 -c 'import json,sys; d=json.load(sys.stdin); print(len(d.get("cookies",[])))' 2>/dev/null || echo 'INVALID JSON!')"
          else
            echo "⚠️ No ZOHO_SESSION_BASE64 secret found, skipping"
          fi

      - name: Run Reporter
        env:
          ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
          ZOHO_PASSWORD: ${{ secrets.ZOHO_PASSWORD }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: node index_simple.js
