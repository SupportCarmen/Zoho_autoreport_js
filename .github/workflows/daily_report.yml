name: Zoho Daily Report

on:
  push:
    branches:
      - dev
  schedule:
    # ตั้งเวลาให้รัน (UTC) 11:00 UTC คือ 18:00 ไทย
    - cron: '0 11 * * *'
  workflow_dispatch: # กดรันเองได้ด้วยมือ

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Browsers
        run: |
          if [ -d "$HOME/.cache/ms-playwright" ] && [ "$(ls -A $HOME/.cache/ms-playwright)" ]; then
            echo "✅ Browsers cached, skipping deps install"
            npx playwright install chromium
          else
            echo "⬇️ No cache, installing browsers with deps..."
            npx playwright install --with-deps chromium
          fi

      - name: Install xvfb
        run: sudo apt-get install -y xvfb

      - name: Decode Zoho Session
        run: |
          if [ -n "${{ secrets.ZOHO_SESSION_BASE64 }}" ]; then
            echo "${{ secrets.ZOHO_SESSION_BASE64 }}" | base64 -d > session.json
            echo "✅ Session decoded"
          else
            echo "⚠️ No ZOHO_SESSION_BASE64 secret found, will use password login"
          fi

      - name: Run Reporter
        env:
          ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
          ZOHO_PASSWORD: ${{ secrets.ZOHO_PASSWORD }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: xvfb-run node index_simple.js